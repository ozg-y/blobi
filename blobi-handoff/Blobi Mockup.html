document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec - re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te(-34deg); transform-origin:left; opacity:.8;\"><\u002Fdiv>\n          <div style=\"position:absolute; left:16px; bottom:16px; width:12px; height:12px; background:#ff5b9e; border:2px solid #6d2c52; border-radius:2px;\"><\u002Fdiv>\n          <!-- monsters -->\n          <img ref=\"{{ refMon1 }}\" alt=\"beast\" style=\"position:absolute; left:34px; top:150px; width:46px; image-rendering:pixelated; filter:drop-shadow(2px 3px 0 rgba(109,44,82,.18)); animation:bob 2.4s ease-in-out infinite;\">\n          <img ref=\"{{ refMon2 }}\" alt=\"beast\" style=\"position:absolute; left:188px; top:372px; width:48px; image-rendering:pixelated; filter:drop-shadow(2px 3px 0 rgba(109,44,82,.18)); animation:bob 2.8s ease-in-out infinite;\">\n          <!-- blob -->\n          <img ref=\"{{ refBlobA }}\" alt=\"blob\" style=\"position:absolute; left:96px; top:236px; width:98px; image-rendering:pixelated; filter:drop-shadow(3px 4px 0 rgba(109,44,82,.2)); animation:floaty 3.4s ease-in-out infinite;\">\n          <!-- label -->\n          <div style=\"position:absolute; bottom:22px; right:18px; background:#fff; border:2px solid #6d2c52; border-radius:10px; padding:5px 9px; font-family:'Nunito'; font-weight:800; font-size:11px; color:#8a4a75;\">VISIBLE = bounces off walls<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:300px; text-align:center;\">\n        <div style=\"font-family:'Press Start 2P'; font-size:12px; color:#6d2c52; margin-bottom:6px;\">1 · PLAY<\u002Fdiv>\n        <div style=\"font-family:'Nunito'; font-weight:700; font-size:14px; color:#8a4a75; line-height:1.45;\">Blob drifts &amp; bounces. Beasts spawn away from the corners.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PHONE 2 : CLOAK -->\n    <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px;\">\n      <div style=\"width:300px; height:600px; background:#fff; border:4px solid #6d2c52; border-radius:46px; padding:12px; box-shadow:10px 12px 0 #ffb8dd; posi      <div style=\"position:absolute; left:50%; top:50%; width:60px; height:60px; border:3px solid #ff5b9e; border-radius:50%; animation:ring 1.6s ease-out infinite;\"><\u002Fdiv>\n            <div style=\"position:absolute; left:50%; top:50%; width:60px; height:60px; border:3px solid #ff5b9e; border-radius:50%; animation:ring 1.6s ease-out .8s infinite;\"><\u002Fdiv>\n            <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:44px; height:44px; background:rgba(255,91,158,.9); border:3px solid #6d2c52; border-radius:50%;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute; bottom:22px; left:0; right:0; text-align:center; font-family:'Press Start 2P'; font-size:9px; color:#6d2c52;\">HOLD TO CLOAK &amp; PHASE<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:300px; text-align:center;\">\n        <div style=\"font-family:'Press Start 2P'; font-size:12px; color:#6d2c52; margin-bottom:6px;\">2 · CLOAK<\u002Fdiv>\n        <div style=\"font-family:'Nunito'; font-weight:700; font-size:14px; color:#8a4a75; line-height:1.45;\">Hold → invisible &amp; harmless to beasts. But blind: walls kill, no bounce.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PHONE 3 : GAME OVER -->\n    <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px;\">\n      <div style=\"width:300px; height:600px; background:#fff; border:4px solid #6d2c52; border-radius:46px; padding:12px; box-shadow:10px 12px 0 #ffb8dd; position:relative;\">\n        <div style=\"position:absolute; top:20px; left:50%; transform:translateX(-50%); width:96px; height:20px; background:#6d2c52; border-radius:0 0 14px 14px; z-index:6;\"><\u002Fdiv>\n        <div style=\"width:100%; height:100%; border-radius:34px; overflow:hidden; position:relative; background:linear-gradient(180deg,#eef8ff 0%,#e6f0ff 100%);\">\n          <div style=\"position:absolute; inset:0; background-image:radial-gradient(#ffffff 1.6px, transparent 1.8px); background-size:18px 18px; opacity:.35;\"><\u002Fdiv>\n          <div style=\"position:absolute; inset:0; background:rgba(50,25,60,.5);\"><\u002Fdiv>\n          <!-- burst shards -->\n          <div style=\"position:absolute; left:150px; top:250px; width:10px; height:10px; background:#ff9fc9; border:2px solid #6d2c52; --bx:-46px; --by:-30px; animation:burst 1.6s ease-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute; left:150px; top:250px; width:8px; height:8px; background:#ffd3e8; border:2px solid #6d2c52; --bx:44px; --by:-38px; animation:burst 1.6s ease-out .2s infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute; left:150px; top:250px; width:9px; height:9px; background:#f472ab; border:2px solid #6d2c52; --bx:-40px; --by:34px; animation:burst 1.6s ease-out .35s infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute; left:150px; top:250px; width:8px; height:8px; background:#ff9fc9; border:2px solid #6d2c52; --bx:48px; --by:30px; animation:burst 1.6s ease-out .5s infinite;\"><\u002Fdiv>\n          <!-- dead blob -->\n          <img ref=\"{{ refBlobADead }}\" alt=\"dead blob\" style=\"position:absolute; left:104px; top:200px; width:96px; image-rendering:pixelated; filter:drop-shadow(3px 4px 0 rgba(0,0,0,.28)); animation:shakeit 0.9s ease-in-out infinite;\">\n          <!-- overlay text -->\n          <div style=\"position:absolute; left:0; right:0; top:328px; text-align:center;\">\n            <div style=\"font-family:'Press Start 2P'; font-size:22px; color:#ff5b9e; text-shadow:3px 3px 0 #6d2c52; margin-bottom:22px;\">GAME<br>OVER<\u002Fdiv>\n            <div style=\"display:inline-flex; gap:26px; margin-bottom:26px;\">\n              <div style=\"font-family:'Press Start 2P'; font-size:10px; color:#ffd3e8;\">SCORE<br><span style=\"font-size:16px; color:#fff;\">12<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Press Start 2P'; font-size:10px; color:#ffb8dd;\">BEST<br><span style=\"font-size:16px; color:#ffd3e8;\">21<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'Press Start 2P'; font-size:11px; color:#fff; animation:blinktext 1.4s steps(1) infinite;\">TAP TO RETRY<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:300px; text-align:center;\">\n        <div style=\"font-family:'Press Start 2P'; font-size:12px; color:#6d2c52; margin-bottom:6px;\">3 · GAME OVER<\u002Fdiv>\n        <div style=\"font-family:'Nunito'; font-weight:700; font-size:14px; color:#8a4a75; line-height:1.45;\">Touch a beast, or hit a wall while cloaked → eyes go <strong>x x<\u002Fstrong>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CHARACTER -->\n  <div style=\"margin-top:52px; background:#fff; border:4px solid #6d2c52; border-radius:26px; box-shadow:8px 10px 0 #9fd0ff; padding:34px 40px;\">\n    <h2 style=\"font-family:'Press Start 2P'; font-size:20px; margin:0 0 24px; color:#6d2c52;\">MEET BLOBI<\u002Fh2>\n    <sc-for list=\"{{ chars }}\" as=\"ch\" hint-placeholder-count=\"1\">\n      <div style=\"display:flex; align-items:center; gap:40px; flex-wrap:wrap;\">\n        <div style=\"flex-shrink:0; background:linear-gradient(180deg,#f4fbff,#e7f3ff); border:3px solid #6d2c52; border-radius:20px; padding:28px 44px;\">\n          <img ref=\"{{ ch.ref }}\" alt=\"Blobi\" style=\"width:190px; image-rendering:pixelated; filter:drop-shadow(3px 4px 0 rgba(58,74,102,.22)); animation:floaty 3.6s ease-in-out infinite;\">\n        <\u002Fdiv>\n        <div style=\"flex:1; min-width:280px;\">\n          <div style=\"font-family:'Press Start 2P'; font-size:18px; color:#6d2c52; margin-bottom:14px;\">{{ ch.name }}<\u002Fdiv>\n          <div style=\"font-family:'Nunito'; font-weight:700; font-size:16px; color:#5a6a86; line-height:1.55; max-width:520px;\">{{ ch.note }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:8px; background:linear-gradient(180deg,#f4fbff,#e7f3ff); border:3px dashed #6d2c52; border-radius:20px; padding:24px 32px;\">\n          <img ref=\"{{ ch.deadRef }}\" alt=\"Blobi dead\" style=\"width:120px; image-rendering:pixelated;\">\n          <span style=\"font-family:'Press Start 2P'; font-size:9px; color:#c05a92;\">DEAD · x x<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- MONSTER GALLERY + MECHANICS -->\n  <div style=\"display:grid; grid-template-columns:1.05fr 1fr; gap:32px; margin-top:32px;\">\n    <!-- beast -->\n    <div style=\"background:#fff; border:4px solid #6d2c52; border-radius:26px; box-shadow:8px 10px 0 #9fd0ff; padding:34px 36px;\">\n      <h2 style=\"font-family:'Press Start 2P'; font-size:18px; margin:0 0 8px; color:#6d2c52;\">THE BEAST<\u002Fh2>\n      <p style=\"font-family:'Nunito'; font-weight:700; font-size:13px; color:#5a6a86; margin:0 0 26px;\">Smaller than Blobi · toothy face · deadly on touch when visible.<\u002Fp>\n      <sc-for list=\"{{ monsters }}\" as=\"mo\" hint-placeholder-count=\"1\">\n        <div style=\"display:flex; align-items:center; gap:28px; background:linear-gradient(180deg,#f4fbff,#e7f3ff); border:3px solid #6d2c52; border-radius:18px; padding:24px 28px;\">\n          <img ref=\"{{ mo.ref }}\" alt=\"beast\" style=\"width:118px; image-rendering:pixelated; filter:drop-shadow(2px 3px 0 rgba(58,74,102,.22)); animation:bob 2.4s ease-in-out infinite;\">\n          <div>\n            <div style=\"font-family:'Press Start 2P'; font-size:15px; color:#6d2c52; margin-bottom:10px;\">{{ mo.name }}<\u002Fdiv>\n            <div style=\"font-family:'Nunito'; font-weight:700; font-size:14px; color:#5a6a86; line-height:1.5;\">{{ mo.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <!-- mechanics -->\n    <div style=\"background:#6d2c52; border:4px solid #6d2c52; border-radius:26px; box-shadow:8px 10px 0 #ffb8dd; padding:32px 34px; color:#ffe9f6;\">\n      <h2 style=\"font-family:'Press Start 2P'; font-size:18px; margin:0 0 22px; color:#ffd3e8;\">THE RULES<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <sc-for list=\"{{ rules }}\" as=\"r\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n            <div style=\"flex-shrink:0; width:30px; height:30px; background:#ff5b9e; border:2px solid #ffd3e8; border-radius:8px; font-family:'Press Start 2P'; font-size:11px; color:#fff; display:flex; align-items:center; justify-content:center;\">{{ r.n }}<\u002Fdiv>\n            <div style=\"font-family:'Nunito'; font-weight:700; font-size:14px; line-height:1.5; color:#ffeaf6;\">{{ r.t }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:24px; padding-top:20px; border-top:2px dashed #a2497f; font-family:'Nunito'; font-weight:800; font-size:13px; color:#ffb8dd;\">Full timings, spawn zones &amp; tuning knobs → <span style=\"color:#fff;\">README.md<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  makeCanvas(cols, rows, scale){\n    const c = document.createElement('canvas');\n    c.width = cols * scale; c.height = rows * scale;\n    const ctx = c.getContext('2d'); ctx.imageSmoothingEnabled = false;\n    return { c, ctx, cols, rows, scale };\n  }\n  px(ctx, x, y, s, color){ ctx.fillStyle = color; ctx.fillRect(x * s, y * s, s, s); }\n  inEll(cx, cy, x, y, rx, ry){ const dx = (x - cx) / rx, dy = (y - cy) / ry; return dx * dx + dy * dy <= 1; }\n  anyShape(shapes, x, y){ for (const s of shapes){ if (this.inEll(s.cx, s.cy, x, y, s.rx, s.ry)) return true; } return false; }\n  inHorns(horns, col, row){\n    if (!horns) return false;\n    const x = col + 0.5, y = row + 0.5;\n    for (const h of horns){\n      if (y >= h.topY && y <= h.baseY){\n        const frac = (y - h.topY) / (h.baseY - h.topY);\n        const halfw = h.hw * frac;\n        if (Math.abs(x - h.cx) <= halfw) return true;\n      }\n    }\n    return false;\n  }\n\n  buildBlob(cfg){\n    const cols = 24, rows = 22, scale = 8;\n    const { c, ctx } = this.makeCanvas(cols, rows, scale);\n    const P = cfg.pal;\n    const feet = cfg.feet || [], arms = cfg.arms || [];\n    const union = cfg.body.concat(feet, arms);\n    const inside = (col, row) => this.anyShape(union, col + 0.5, row + 0.5);\n    const inFeet = (col, row) => this.anyShape(feet, col + 0.5, row + 0.5);\n    for (let row = 0; row < rows; row++){\n      for (let col = 0; col < cols; col++){\n        if (!inside(col, row)) continue;\n        const edge = !inside(col - 1, row) || !inside(col + 1, row) || !inside(col, row - 1) || !inside(col, row + 1);\n        let color;\n        if (edge){ color = P.o; }\n        else if (inFeet(col, row)){ color = (row >= cfg.footShadeRow ? P.fs : P.f); }\n        else {\n          const x = col + 0.5, y = row + 0.5;\n          if (this.inEll(cfg.hi.cx, cfg.hi.cy, x, y, cfg.hi.rx, cfg.hi.ry)) color = P.P;\n          else if (this.inEll(cfg.sh.cx, cfg.sh.cy, x, y, cfg.sh.rx, cfg.sh.ry)) color = P.s;\n          else color = P.p;\n        }\n        this.px(ctx, col, row, scale, color);\n      }\n    }\n    // cheeks\n    for (const ch of (cfg.cheeks || [])){\n      for (let dy = 0; dy < 2; dy++) for (let dx = 0; dx < 2; dx++){\n        const col = Math.round(ch.x) + dx, row = Math.round(ch.y) + dy;\n        if (inside(col, row) && inside(col - 1, row) && inside(col + 1, row) && inside(col, row - 1) && inside(col, row + 1))\n          this.px(ctx, col, row, scale, P.c);\n      }\n    }\n    const notEdge = (col, row) => inside(col, row) && inside(col - 1, row) && inside(col + 1, row) && inside(col, row - 1) && inside(col, row + 1);\n    if (cfg.dead){\n      for (const e of cfg.eyes){\n        const ex = Math.round(e.x), ey = Math.round(e.y);\n        for (let d = -1; d <= 1; d++){ this.px(ctx, ex + d, ey + d, scale, P.e); this.px(ctx, ex + d, ey - d, scale, P.e); }\n      }\n    } else {\n      const erx = cfg.eyeRx || 1.7, ery = cfg.eyeRy || 2.5;\n      for (const e of cfg.eyes){\n        for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n          if (this.inEll(e.x, e.y, col + 0.5, row + 0.5, erx, ery) && notEdge(col, row)) this.px(ctx, col, row, scale, P.w);\n        }\n        for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n          if (this.inEll(e.x + 0.1, e.y + 0.6, col + 0.5, row + 0.5, 1.0, 1.5) && notEdge(col, row)) this.px(ctx, col, row, scale, P.e);\n        }\n        this.px(ctx, Math.round(e.x - 0.7), Math.round(e.y - 1.2), scale, P.w);\n      }\n    }\n    if (cfg.mouth){\n      const m = cfg.mouth;\n      for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n        const y = row + 0.5;\n        if (this.inEll(m.x, m.y, col + 0.5, y, m.rx, m.ry) && notEdge(col, row))\n          this.px(ctx, col, row, scale, (y > m.y ? P.mi : P.m));\n      }\n    }\n    return c.toDataURL();\n  }\n\n  buildMonster(cfg){\n    const cols = 16, rows = 16, scale = 8;\n    const { c, ctx } = this.makeCanvas(cols, rows, scale);\n    const P = cfg.pal;\n    const inside = (col, row) => this.anyShape(cfg.body, col + 0.5, row + 0.5) || this.inHorns(cfg.horns, col, row);\n    for (let row = 0; row < rows; row++){\n      for (let col = 0; col < cols; col++){\n        if (!inside(col, row)) continue;\n        const edge = !inside(col - 1, row) || !inside(col + 1, row) || !inside(col, row - 1) || !inside(col, row + 1);\n        let color;\n        if (edge) color = P.o;\n        else if (this.inEll(cfg.sh.cx, cfg.sh.cy, col + 0.5, row + 0.5, cfg.sh.rx, cfg.sh.ry)) color = P.s;\n        else color = P.p;\n        this.px(ctx, col, row, scale, color);\n      }\n    }\n    const notEdge = (col, row) => inside(col, row) && inside(col - 1, row) && inside(col + 1, row) && inside(col, row - 1) && inside(col, row + 1);\n    // mouth (dark region)\n    const m = cfg.mouth;\n    for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n      if (this.inEll(m.x, m.y, col + 0.5, row + 0.5, m.rx, m.ry) && notEdge(col, row)) this.px(ctx, col, row, scale, P.m);\n    }\n    // teeth (white triangles pointing down from mouth top)\n    const teeth = cfg.teeth || 4;\n    for (let i = 0; i < teeth; i++){\n      const tx = m.x - m.rx + (i + 0.5) * (2 * m.rx / teeth);\n      const topY = m.y - m.ry, h = m.ry * 1.7, hw = (m.rx / teeth) * 0.95;\n      for (let r = 0; r <= h; r++){\n        const y = topY + r, frac = 1 - r / h, halfw = hw * frac;\n        for (let col = 0; col < cols; col++){\n          const x = col + 0.5;\n          if (Math.abs(x - tx) <= halfw && this.inEll(m.x, m.y, x, y, m.rx, m.ry)){\n            this.px(ctx, col, Math.floor(y), scale, P.w);\n          }\n        }\n      }\n    }\n    // eyes\n    const eyes = cfg.oneEye ? [cfg.oneEye] : cfg.eyes;\n    const erx = cfg.oneEye ? cfg.oneEye.rx : 1.5, ery = cfg.oneEye ? cfg.oneEye.ry : 1.7;\n    for (const e of eyes){\n      for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n        if (this.inEll(e.x, e.y, col + 0.5, row + 0.5, erx, ery) && notEdge(col, row)) this.px(ctx, col, row, scale, P.w);\n      }\n      for (let row = 0; row < rows; row++) for (let col = 0; col < cols; col++){\n        if (this.inEll(e.x, e.y + 0.4, col + 0.5, row + 0.5, erx * 0.62, ery * 0.62) && notEdge(col, row)) this.px(ctx, col, row, scale, P.e);\n      }\n    }\n    // angry brows\n    for (const b of (cfg.brows || [])){\n      for (let i = 0; i < b.len; i++){\n        const col = Math.round(b.x + i * b.dx), row = Math.round(b.y + i * b.dy);\n        if (notEdge(col, row)){ this.px(ctx, col, row, scale, P.o); this.px(ctx, col, row + 1, scale, P.o); }\n      }\n    }\n    return c.toDataURL();\n  }\n\n  cfgA(dead){ return {\n    body:[{cx:11.5,cy:10.5,rx:8.5,ry:7.2},{cx:6.5,cy:5,rx:3.4,ry:3},{cx:17.6,cy:12.6,rx:4.6,ry:4.4},{cx:10.5,cy:16,rx:6,ry:3.4}],\n    arms:[{cx:2.6,cy:12,rx:2.2,ry:2.6},{cx:20.9,cy:8.4,rx:2.2,ry:2.6}],\n    feet:[{cx:8,cy:19.2,rx:3,ry:2},{cx:15,cy:19.6,rx:3,ry:2}], footShadeRow:20,\n    hi:{cx:7.5,cy:6.5,rx:3.4,ry:3}, sh:{cx:16.5,cy:15,rx:6.5,ry:5.5},\n    eyes:[{x:8.6,y:8.2},{x:14.2,y:8.2}], mouth:{x:11.4,y:12.6,rx:1.7,ry:1.5},\n    cheeks:[{x:5.2,y:11.4},{x:16.8,y:11.4}],\n    pal:{o:'#6d2c52',p:'#ff9fc9',P:'#ffd3e8',s:'#f472ab',f:'#e2569b',fs:'#c23f82',w:'#ffffff',e:'#2a2c66',m:'#ff5b7f',mi:'#d63a63',c:'#ff77b0'},\n    dead:!!dead\n  }; }\n  cfgB(dead){ return {\n    body:[{cx:12,cy:10,rx:9,ry:6.3},{cx:6,cy:14,rx:3.2,ry:4},{cx:13.5,cy:4,rx:3,ry:2.6},{cx:19.6,cy:11,rx:3.2,ry:3.2}],\n    arms:[{cx:2.4,cy:9.4,rx:2,ry:2.4},{cx:22,cy:12,rx:2,ry:2.4}],\n    feet:[{cx:9,cy:18.6,rx:3,ry:1.9},{cx:16,cy:17.6,rx:2.8,ry:1.9}], footShadeRow:19,\n    hi:{cx:8,cy:6,rx:3,ry:2.6}, sh:{cx:16.5,cy:13,rx:6.5,ry:5.5},\n    eyes:[{x:9.5,y:8},{x:15,y:8}], eyeRy:2.0, mouth:{x:12.2,y:11.4,rx:1.3,ry:1.1},\n    cheeks:[{x:6.2,y:10.4},{x:18,y:10.4}],\n    pal:{o:'#7a3140',p:'#ffb1b9',P:'#ffe1e1',s:'#ff8a97',f:'#f06b86',fs:'#d64e6c',w:'#ffffff',e:'#3a2140',m:'#ff6f86',mi:'#e0475f',c:'#ff8aa0'},\n    dead:!!dead\n  }; }\n  cfgC(dead){ return {\n    body:[{cx:11,cy:11.5,rx:6.8,ry:8},{cx:11,cy:4.5,rx:4,ry:3},{cx:5.2,cy:10,rx:3,ry:3.4},{cx:16.9,cy:12,rx:3.4,ry:3.8}],\n    arms:[{cx:2.2,cy:13,rx:2,ry:2.4},{cx:19.6,cy:9,rx:2,ry:2.4}],\n    feet:[{cx:8,cy:19.8,rx:2.8,ry:2},{cx:14.5,cy:19.8,rx:2.8,ry:2}], footShadeRow:20,\n    hi:{cx:8,cy:6,rx:3,ry:3}, sh:{cx:15,cy:15.5,rx:6,ry:6},\n    eyes:[{x:8.4,y:9},{x:13.6,y:9}], mouth:{x:11,y:13,rx:2.2,ry:2},\n    cheeks:[{x:5.0,y:12},{x:16.4,y:12}],\n    pal:{o:'#5f2b58',p:'#f79ae0',P:'#ffd3f5',s:'#e070c8',f:'#d85fc0',fs:'#b746a1',w:'#ffffff',e:'#3a1f52',m:'#ff5fae',mi:'#df3f8f',c:'#ff86cf'},\n    dead:!!dead\n  }; }\n\n  cfgBlobi(dead){ return {\n    body:[{cx:11.5,cy:10.6,rx:8.3,ry:8.0},{cx:8.2,cy:5.4,rx:3.1,ry:2.8},{cx:15.4,cy:14.8,rx:3.4,ry:3.1}],\n    arms:[{cx:2.7,cy:11.4,rx:2.1,ry:2.5},{cx:20.7,cy:9,rx:2.1,ry:2.5}],\n    feet:[{cx:8,cy:19.3,rx:3,ry:2},{cx:15,cy:19.5,rx:3,ry:2}], footShadeRow:20,\n    hi:{cx:7.8,cy:6.6,rx:3.4,ry:3.1}, sh:{cx:15.8,cy:15,rx:6,ry:5.5},\n    eyes:[{x:8.6,y:8.3},{x:14.2,y:8.3}], mouth:{x:11.4,y:12.8,rx:1.7,ry:1.5},\n    cheeks:[{x:5.3,y:11.6},{x:16.9,y:11.6}],\n    pal:{o:'#6d2c52',p:'#ff9fc9',P:'#ffd3e8',s:'#f472ab',f:'#e2569b',fs:'#c23f82',w:'#ffffff',e:'#2a2c66',m:'#ff5b7f',mi:'#d63a63',c:'#ff77b0'},\n    dead:!!dead\n  }; }\n  cfgBlobiDead(){ const c = this.cfgB(true); c.pal = this.cfgBlobi().pal; return c; }\n  gnashCfg(){ return {\n    body:[{cx:8,cy:8.5,rx:6,ry:5.6}],\n    horns:[{cx:3.6,baseY:4.5,topY:1,hw:1.7},{cx:12.4,baseY:4.5,topY:1,hw:1.7}],\n    sh:{cx:10.5,cy:11,rx:5,ry:4.5},\n    eyes:[{x:5.7,y:7.2},{x:10.3,y:7.2}],\n    brows:[{x:4.2,y:5.2,dx:0.6,dy:0.5,len:3},{x:11.8,y:5.2,dx:-0.6,dy:0.5,len:3}],\n    mouth:{x:8,y:11.2,rx:3.6,ry:1.9}, teeth:4,\n    pal:{o:'#3f2b6b',p:'#a98bff',s:'#7d5fe0',w:'#ffffff',e:'#241546',m:'#3a2360'}\n  }; }\n\n  srcRef(url){ return (el) => { if (el && el.getAttribute('src') !== url) el.setAttribute('src', url); }; }\n\n  renderVals(){\n    if (!this._s){\n      const blobi = this.buildBlob(this.cfgBlobi());\n      const blobiDead = this.buildBlob(this.cfgBlobiDead());\n      const gnash = this.buildMonster(this.gnashCfg());\n      const chars = [\n        { name:'BLOBI', note:'Round & squishy \- a piece of bubblegum, not a perfect ball. Big shiny eyes, blush, tiny mouth. On death it splats flat with x x eyes.', ref:this.srcRef(blobi), deadRef:this.srcRef(blobiDead) }\n      ];\n      const monsters = [\n        { name:'GNASH', note:'Horned biter \- four fangs, angry brows. The one and only beast.', ref:this.srcRef(gnash) }\n      ];\n      const rules = [\n        { n:'1', t:'Blob auto-drifts and bounces off all four walls while VISIBLE.' },\n        { n:'2', t:'Beasts spawn one at a time, never near a corner \- so you always have room to un-cloak and bounce after passing.' },\n        { n:'3', t:'Tap & HOLD anywhere \\u2192 blob turns invisible and can pass through beasts unharmed.' },\n        { n:'4', t:'While cloaked you\\u2019re blind: the blob keeps moving but does NOT bounce \- touch a wall and you die.' },\n        { n:'5', t:'Release once you\\u2019ve cleared the beast. The beast only despawns after you\\u2019ve fully passed it AND become visible again.' },\n        { n:'6', t:'Die = eyes turn x x, screen shakes, retry. Score = beasts cleared; best score saved.' }\n      ];\n      this._s = { chars, monsters, rules,\n        refMon1:this.srcRef(gnash), refMon2:this.srcRef(gnash), refBlobA:this.srcRef(blobi), refBlobADead:this.srcRef(blobiDead) };\n    }\n    return this._s;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
